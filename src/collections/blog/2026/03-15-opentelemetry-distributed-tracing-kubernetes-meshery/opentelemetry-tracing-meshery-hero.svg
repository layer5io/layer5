<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="otelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f05032;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fc8c54;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mesheryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b39f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d3a9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="traceGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="traceGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="traceGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEFT PANEL: Service nodes -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Service A node -->
  <rect x="60" y="180" width="130" height="60" rx="8" fill="#1e2a3a" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="83" cy="210" r="10" fill="#2563eb" opacity="0.8"/>
  <text x="100" y="206" font-family="monospace" font-size="11" fill="#93c5fd">order-svc</text>
  <text x="100" y="220" font-family="monospace" font-size="9" fill="#6b7280">Java · port 8080</text>

  <!-- Service B node -->
  <rect x="60" y="280" width="130" height="60" rx="8" fill="#1e2a3a" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="83" cy="310" r="10" fill="#7c3aed" opacity="0.8"/>
  <text x="100" y="306" font-family="monospace" font-size="11" fill="#c4b5fd">inventory-svc</text>
  <text x="100" y="320" font-family="monospace" font-size="9" fill="#6b7280">Python · port 8081</text>

  <!-- Service C node -->
  <rect x="60" y="380" width="130" height="60" rx="8" fill="#1e2a3a" stroke="#0891b2" stroke-width="1.5"/>
  <circle cx="83" cy="410" r="10" fill="#0891b2" opacity="0.8"/>
  <text x="100" y="406" font-family="monospace" font-size="11" fill="#67e8f9">payment-svc</text>
  <text x="100" y="420" font-family="monospace" font-size="9" fill="#6b7280">Node.js · port 8082</text>

  <!-- OTel SDK badges -->
  <rect x="65" y="247" width="120" height="20" rx="4" fill="#1a2332"/>
  <text x="125" y="261" font-family="monospace" font-size="8" fill="#f05032" text-anchor="middle">OTel SDK injected</text>

  <rect x="65" y="347" width="120" height="20" rx="4" fill="#1a2332"/>
  <text x="125" y="361" font-family="monospace" font-size="8" fill="#f05032" text-anchor="middle">OTel SDK injected</text>

  <rect x="65" y="447" width="120" height="20" rx="4" fill="#1a2332"/>
  <text x="125" y="461" font-family="monospace" font-size="8" fill="#f05032" text-anchor="middle">OTel SDK injected</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- OTLP ARROWS  service → collector -->
  <!-- ═══════════════════════════════════════════════════ -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d3a9"/>
    </marker>
  </defs>

  <line x1="190" y1="210" x2="370" y2="300" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <line x1="190" y1="310" x2="370" y2="310" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)" opacity="0.7"/>
  <line x1="190" y1="410" x2="370" y2="322" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowCyan)" opacity="0.7"/>

  <!-- OTLP label -->
  <text x="270" y="258" font-family="monospace" font-size="9" fill="#f05032" text-anchor="middle">OTLP/gRPC</text>
  <text x="270" y="270" font-family="monospace" font-size="9" fill="#f05032" text-anchor="middle">:4317</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CENTER: OTel Collector box -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="370" y="230" width="200" height="160" rx="10" fill="#1a1f2e" stroke="#f05032" stroke-width="2"/>

  <!-- Collector header -->
  <rect x="370" y="230" width="200" height="36" rx="10" fill="#f05032" opacity="0.15"/>
  <rect x="370" y="252" width="200" height="14" fill="#f05032" opacity="0.15"/>
  <text x="470" y="252" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fc8c54" text-anchor="middle">OTel Collector</text>

  <!-- Pipeline stages -->
  <rect x="385" y="278" width="170" height="24" rx="4" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="470" y="294" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">receivers: otlp (grpc, http)</text>

  <rect x="385" y="308" width="170" height="24" rx="4" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="470" y="324" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">processors: batch, sampling</text>

  <rect x="385" y="338" width="170" height="24" rx="4" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="470" y="354" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">exporters: otlp/jaeger</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ARROW: collector → jaeger -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="570" y1="310" x2="740" y2="310" stroke="#00d3a9" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.8"/>
  <text x="655" y="300" font-family="monospace" font-size="9" fill="#00b39f" text-anchor="middle">OTLP export</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- RIGHT: Jaeger backend -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="740" y="230" width="190" height="160" rx="10" fill="#1a1f2e" stroke="#f59e0b" stroke-width="2"/>
  <rect x="740" y="230" width="190" height="36" rx="10" fill="#f59e0b" opacity="0.15"/>
  <rect x="740" y="252" width="190" height="14" fill="#f59e0b" opacity="0.15"/>
  <text x="835" y="252" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fbbf24" text-anchor="middle">Jaeger</text>

  <!-- Jaeger trace flamegraph mock -->
  <rect x="755" y="278" width="160" height="14" rx="2" fill="url(#traceGrad1)" opacity="0.85"/>
  <text x="835" y="289" font-family="monospace" font-size="9" fill="white" text-anchor="middle">GET /api/orders  482ms</text>

  <rect x="755" y="298" width="110" height="12" rx="2" fill="url(#traceGrad2)" opacity="0.8"/>
  <text x="810" y="308" font-family="monospace" font-size="9" fill="white" text-anchor="middle">inventory  301ms</text>

  <rect x="755" y="316" width="70" height="12" rx="2" fill="url(#traceGrad3)" opacity="0.8"/>
  <text x="790" y="326" font-family="monospace" font-size="9" fill="white" text-anchor="middle">payment 190ms</text>

  <rect x="755" y="334" width="45" height="12" rx="2" fill="#065f46" opacity="0.9" stroke="#10b981" stroke-width="0.5"/>
  <text x="778" y="344" font-family="monospace" font-size="9" fill="#6ee7b7" text-anchor="middle">db 82ms</text>

  <text x="835" y="372" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">trace_id: a3f2c1...</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BOTTOM: Meshery panel -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="370" y="440" width="560" height="90" rx="10" fill="#0d2b27" stroke="#00b39f" stroke-width="1.5"/>
  <text x="650" y="466" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00d3a9" text-anchor="middle">Meshery — OTel Stack Design</text>

  <!-- Design nodes visualization -->
  <circle cx="420" cy="497" r="14" fill="#1a3a33" stroke="#00b39f" stroke-width="1.5"/>
  <text x="420" y="501" font-family="monospace" font-size="8" fill="#00d3a9" text-anchor="middle">Coll.</text>

  <circle cx="490" cy="497" r="14" fill="#1a3a33" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="501" font-family="monospace" font-size="8" fill="#fbbf24" text-anchor="middle">Jaeger</text>

  <circle cx="560" cy="497" r="14" fill="#1a3a33" stroke="#2563eb" stroke-width="1.5"/>
  <text x="560" y="501" font-family="monospace" font-size="8" fill="#93c5fd" text-anchor="middle">Instr.</text>

  <circle cx="630" cy="497" r="14" fill="#1a3a33" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="630" y="501" font-family="monospace" font-size="8" fill="#c4b5fd" text-anchor="middle">RBAC</text>

  <line x1="434" y1="497" x2="476" y2="497" stroke="#00b39f" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="504" y1="497" x2="546" y2="497" stroke="#00b39f" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="574" y1="497" x2="616" y2="497" stroke="#00b39f" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

  <text x="700" y="485" font-family="monospace" font-size="9" fill="#6b7280">mesheryctl design apply</text>
  <text x="700" y="500" font-family="monospace" font-size="9" fill="#6b7280">  --name "OTel Tracing Stack"</text>
  <text x="700" y="518" font-family="monospace" font-size="9" fill="#10b981">✓ Applied to cluster</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TITLE BLOCK (top) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="600" y="68" font-family="sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle" filter="url(#softglow)">OpenTelemetry Distributed Tracing</text>
  <text x="600" y="100" font-family="sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">on Kubernetes with Meshery</text>

  <!-- OTel wordmark accent -->
  <rect x="230" y="118" width="740" height="3" rx="2" fill="url(#otelGrad)" opacity="0.5"/>

  <!-- Tag pills -->
  <rect x="370" y="555" width="88" height="22" rx="11" fill="#1e2a3a" stroke="#2563eb" stroke-width="1"/>
  <text x="414" y="570" font-family="sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Kubernetes</text>

  <rect x="468" y="555" width="112" height="22" rx="11" fill="#1e2a3a" stroke="#f05032" stroke-width="1"/>
  <text x="524" y="570" font-family="sans-serif" font-size="10" fill="#fc8c54" text-anchor="middle">OpenTelemetry</text>

  <rect x="590" y="555" width="72" height="22" rx="11" fill="#1e2a3a" stroke="#00b39f" stroke-width="1"/>
  <text x="626" y="570" font-family="sans-serif" font-size="10" fill="#00d3a9" text-anchor="middle">Meshery</text>

  <rect x="672" y="555" width="110" height="22" rx="11" fill="#1e2a3a" stroke="#7c3aed" stroke-width="1"/>
  <text x="727" y="570" font-family="sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">Observability</text>

  <rect x="792" y="555" width="60" height="22" rx="11" fill="#1e2a3a" stroke="#6b7280" stroke-width="1"/>
  <text x="822" y="570" font-family="sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">SRE</text>

  <!-- layer5.io watermark -->
  <text x="1170" y="617" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="end">layer5.io</text>
</svg>
