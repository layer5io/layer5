<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B39F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D3A9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B39F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D3A9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Decorative circles (background) -->
  <circle cx="950" cy="100" r="200" fill="#00B39F" opacity="0.05"/>
  <circle cx="250" cy="530" r="150" fill="#00B39F" opacity="0.05"/>
  <circle cx="1100" cy="500" r="120" fill="#00B39F" opacity="0.04"/>

  <!-- GitOps flow diagram - pipeline nodes -->
  <!-- Node 1: Git Commit -->
  <rect x="60" y="230" width="160" height="80" rx="12" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#00B39F" stroke-width="1.5"/>
  <text x="140" y="262" font-family="monospace" font-size="11" fill="#00B39F" text-anchor="middle">GIT COMMIT</text>
  <text x="140" y="282" font-family="sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="bold">git push</text>
  <text x="140" y="300" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">main branch</text>

  <!-- Arrow 1→2 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00B39F"/>
    </marker>
  </defs>
  <line x1="222" y1="270" x2="268" y2="270" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 2: CI Pipeline -->
  <rect x="270" y="230" width="160" height="80" rx="12" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#00B39F" stroke-width="1.5"/>
  <text x="350" y="262" font-family="monospace" font-size="11" fill="#00B39F" text-anchor="middle">CI PIPELINE</text>
  <text x="350" y="282" font-family="sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Build &amp; Test</text>
  <text x="350" y="300" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">GitHub Actions</text>

  <!-- Arrow 2→3 -->
  <line x1="432" y1="270" x2="478" y2="270" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 3: Kanvas (highlighted) -->
  <rect x="480" y="215" width="180" height="110" rx="12" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#00B39F" stroke-width="2.5"/>
  <!-- Kanvas highlight glow -->
  <rect x="480" y="215" width="180" height="110" rx="12" fill="#00B39F" opacity="0.08"/>
  <text x="570" y="248" font-family="monospace" font-size="11" fill="#00D3A9" text-anchor="middle" font-weight="bold">KANVAS</text>
  <text x="570" y="270" font-family="sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Visualize &amp; Diff</text>
  <text x="570" y="289" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Infrastructure Canvas</text>
  <text x="570" y="308" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">Design Review</text>

  <!-- Arrow 3→4 -->
  <line x1="662" y1="270" x2="708" y2="270" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 4: GitOps Operator -->
  <rect x="710" y="230" width="160" height="80" rx="12" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#00B39F" stroke-width="1.5"/>
  <text x="790" y="262" font-family="monospace" font-size="11" fill="#00B39F" text-anchor="middle">GITOPS OPERATOR</text>
  <text x="790" y="282" font-family="sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Sync State</text>
  <text x="790" y="300" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">Argo CD / Flux</text>

  <!-- Arrow 4→5 -->
  <line x1="872" y1="270" x2="918" y2="270" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Node 5: K8s Cluster -->
  <rect x="920" y="230" width="160" height="80" rx="12" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#00B39F" stroke-width="1.5"/>
  <text x="1000" y="262" font-family="monospace" font-size="11" fill="#00B39F" text-anchor="middle">KUBERNETES</text>
  <text x="1000" y="282" font-family="sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Production</text>
  <text x="1000" y="300" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">Live Cluster</text>

  <!-- Feedback loop arrow from K8s back to Kanvas (curved) -->
  <path d="M 1000 312 Q 1000 380 780 400 Q 570 420 570 328" fill="none" stroke="#00B39F" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead)" opacity="0.6"/>
  <text x="785" y="420" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">live state feedback</text>

  <!-- Main title -->
  <text x="600" y="90" font-family="sans-serif" font-size="38" fill="#f1f5f9" text-anchor="middle" font-weight="bold">GitOps Best Practices</text>
  <text x="600" y="135" font-family="sans-serif" font-size="28" fill="#00B39F" text-anchor="middle" font-weight="600">for Platform Engineering Teams</text>

  <!-- Subtitle / tag line -->
  <text x="600" y="180" font-family="sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Visualize, Manage, and Automate GitOps Workflows with Kanvas</text>

  <!-- Layer5 branding watermark -->
  <text x="1150" y="615" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="end">layer5.io</text>
</svg>
