<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b39f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00b39f" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="intersect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b39f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#00b39f" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#00b39f" opacity="0.7"/>

  <!-- CLI circle (left) -->
  <circle cx="520" cy="330" r="140" fill="none" stroke="url(#cliGrad)" stroke-width="2.5"/>
  <circle cx="520" cy="330" r="140" fill="#00b39f" opacity="0.05"/>

  <!-- MCP circle (right) -->
  <circle cx="680" cy="330" r="140" fill="none" stroke="url(#mcpGrad)" stroke-width="2.5"/>
  <circle cx="680" cy="330" r="140" fill="#ffffff" opacity="0.04"/>

  <!-- Intersection highlight -->
  <clipPath id="clipCli">
    <circle cx="520" cy="330" r="140"/>
  </clipPath>
  <circle cx="680" cy="330" r="140" fill="url(#intersect)" clip-path="url(#clipCli)"/>

  <!-- CLI label -->
  <text x="465" y="335" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#00b39f" text-anchor="middle" opacity="0.9">CLI</text>

  <!-- MCP label -->
  <text x="735" y="335" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.8">MCP</text>

  <!-- Small accent dots around circles -->
  <circle cx="600" cy="190" r="3" fill="#00b39f" opacity="0.4"/>
  <circle cx="600" cy="470" r="3" fill="#00b39f" opacity="0.4"/>
  <circle cx="370" cy="330" r="2.5" fill="#00b39f" opacity="0.3"/>
  <circle cx="830" cy="330" r="2.5" fill="#ffffff" opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="105" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">MCP in 2026</text>

  <!-- Subtitle -->
  <text x="600" y="145" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.7">Durable Standard or Transitional Layer?</text>

  <!-- Divider line under subtitle -->
  <line x1="480" y1="160" x2="720" y2="160" stroke="#00b39f" stroke-width="1" opacity="0.4"/>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="#00b39f" opacity="0.7"/>
</svg>
