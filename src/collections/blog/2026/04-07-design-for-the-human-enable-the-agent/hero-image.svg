<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b39f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00b39f" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#00b39f" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Terminal cursor prompt ">" on the left -->
  <text x="100" y="370" font-family="'Courier New', monospace" font-size="200" font-weight="bold" fill="#00b39f" opacity="0.85">&gt;</text>

  <!-- Blinking cursor line -->
  <rect x="250" y="260" width="4" height="120" fill="#00b39f" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Circuit/node pattern on the right suggesting AI/agents -->
  <!-- Main nodes -->
  <circle cx="820" cy="200" r="8" fill="#00b39f" opacity="0.9"/>
  <circle cx="950" cy="160" r="6" fill="#00b39f" opacity="0.7"/>
  <circle cx="1060" cy="220" r="7" fill="#00b39f" opacity="0.8"/>
  <circle cx="880" cy="310" r="10" fill="#00b39f" opacity="0.9"/>
  <circle cx="1000" cy="340" r="6" fill="#00b39f" opacity="0.6"/>
  <circle cx="1100" cy="310" r="5" fill="#00b39f" opacity="0.7"/>
  <circle cx="780" cy="420" r="6" fill="#00b39f" opacity="0.7"/>
  <circle cx="920" cy="450" r="8" fill="#00b39f" opacity="0.8"/>
  <circle cx="1050" cy="420" r="7" fill="#00b39f" opacity="0.9"/>
  <circle cx="1140" cy="180" r="5" fill="#00b39f" opacity="0.5"/>
  <circle cx="1120" cy="440" r="5" fill="#00b39f" opacity="0.5"/>

  <!-- Connection lines between nodes -->
  <g stroke="#00b39f" stroke-width="1.5" stroke-opacity="0.3" fill="none">
    <line x1="820" y1="200" x2="950" y2="160"/>
    <line x1="950" y1="160" x2="1060" y2="220"/>
    <line x1="1060" y1="220" x2="1140" y2="180"/>
    <line x1="820" y1="200" x2="880" y2="310"/>
    <line x1="880" y1="310" x2="1000" y2="340"/>
    <line x1="1000" y1="340" x2="1100" y2="310"/>
    <line x1="1060" y1="220" x2="1100" y2="310"/>
    <line x1="950" y1="160" x2="880" y2="310"/>
    <line x1="780" y1="420" x2="920" y2="450"/>
    <line x1="920" y1="450" x2="1050" y2="420"/>
    <line x1="1050" y1="420" x2="1120" y2="440"/>
    <line x1="880" y1="310" x2="780" y2="420"/>
    <line x1="880" y1="310" x2="920" y2="450"/>
    <line x1="1000" y1="340" x2="1050" y2="420"/>
    <line x1="1100" y1="310" x2="1050" y2="420"/>
  </g>

  <!-- Pulsing rings on central agent node -->
  <circle cx="880" cy="310" r="18" fill="none" stroke="#00b39f" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="18;30;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Accent line separator -->
  <rect x="80" y="430" width="320" height="2" fill="url(#accent)" rx="1"/>

  <!-- Title text -->
  <text x="600" y="540" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Design for the Human, Enable the Agent</text>

  <!-- Subtitle -->
  <text x="600" y="580" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.5" text-anchor="middle">CLIs are not APIs. That principle hasn't changed.</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="#00b39f" opacity="0.7"/>
</svg>
